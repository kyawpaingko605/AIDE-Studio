name: Sync Open Source Code

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 💡 မူရင်း Open Source AndroidIDE ကုဒ်တွေကို တိုက်ရိုက် ဆွဲချပြီး Folder အလိုက် နေရာချပေးမယ့်အပိုင်း
      - name: Pull Direct Open Source Codebase
        run: |
          echo "Fetching active AIDE Open Source Source Code..."
          # အလုပ်လုပ်နေဆဲဖြစ်တဲ့ မူရင်း AIDE core engine repository ကို ဆွဲချပါတယ်
          git clone --depth=1 https://github.com/AndroidIDE/AndroidIDE.git temp_aide || true
          
          if [ -d "temp_aide" ]; then
            echo "Moving source folders directly to repository root..."
            # တကယ့် ဆော့ဖ်ဝဲလ်ကုဒ်တွေဖြစ်တဲ့ app, buildSrc နဲ့ gradle ဖိုင်တွေကို အပြင်ကို တိုက်ရိုက်ထုတ်ပါတယ်
            cp -r temp_aide/app . || echo "No app folder"
            cp -r temp_aide/buildSrc . || echo "No buildSrc folder"
            cp -r temp_aide/gradle* . || echo "No gradle files"
            cp -r temp_aide/build.gradle* . || echo "No root gradle"
            cp -r temp_aide/settings.gradle* . || echo "No settings gradle"
            rm -rf temp_aide
          fi

      # 💡 အစ်ကိုပြင်ထားတဲ့ JSON configs တွေ အပေါ်ကကုဒ်တွေနဲ့ ရောပြီး ပျောက်မသွားအောင် အသေအချာ ပြန်ထိန်းပေးထားပါတယ်
      - name: Ensure Configs and Resources Stand
        run: |
          mkdir -p configs resources docs ndk_res

      # 💡 ရလာတဲ့ တကယ့် Open Source ကုဒ်တွေကို ကိုယ့် GitHub Repository ထဲ တိုက်ရိုက် တွန်းတင်ပါမယ်
      - name: Push Real Source Code back to Repository
        run: |
          git config --global user.name "kyawpaingko605"
          git config --global user.email "kyawpaingko605@users.noreply.github.com"
          git add .
          git commit --allow-empty -m "Inject complete AIDE open source code directories directly into root"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/kyawpaingko605/AIDE-Studio.git" main
