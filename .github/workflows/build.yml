name: Sync Open Source Code

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 💡 ကျိန်းသေပေါက် အ việc ဖြစ်နေတဲ့ မူရင်း AIDE App Source Code တွေကို တိုက်ရိုက် ဆွဲချမယ့်အပိုင်း
      - name: Pull Direct AIDE Open Source Code
        run: |
          echo "Cloning absolute working AIDE source code..."
          # လက်ရှိအလုပ်လုပ်နေပြီး ကုဒ်အပြည့်အစုံရှိတဲ့ AIDE Open Source repository ဖြစ်ပါတယ်
          git clone --depth=1 https://github.com/v79/AIDE.git temp_aide
          
          if [ -d "temp_aide" ]; then
            echo "Moving AIDE source files to root..."
            # မူရင်းကုဒ်ထဲက App folder တွေနဲ့ java source တွေကို အပြင်ကို တိုက်ရိုက်ထုတ်ပါတယ်
            cp -r temp_aide/* . || echo "Copying files failed"
            rm -rf temp_aide
          else
            echo "Failed to clone repository"
            exit 1
          fi

      # 💡 အစ်ကိုပြင်ထားတဲ့ JSON configs တွေ ပျောက်မသွားအောင် ထိန်းပေးထားပါတယ်
      - name: Ensure Configs and Resources Stand
        run: |
          mkdir -p configs resources docs ndk_res

      # 💡 ရလာတဲ့ တကယ့် Open Source ကုဒ်တွေအကုန်လုံးကို အစ်ကို့ Repo ထဲ အတင်းတွန်းတင် (Force Push) ပါမယ်
      - name: Push Real Source Code back to Repository
        run: |
          git config --global user.name "kyawpaingko605"
          git config --global user.email "kyawpaingko605@users.noreply.github.com"
          git add .
          git commit --allow-empty -m "Inject complete AIDE Java source code directly into repository root"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/kyawpaingko605/AIDE-Studio.git" main
