name: Sync Open Source Code

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 💡 လင့်ခ်အသေတွေမသုံးဘဲ လက်ရှိအလုပ်လုပ်နေတဲ့ AIDE Source Code ကို အတင်းဆွဲချပြီး ပေါင်းထည့်မယ့်အပိုင်း
      - name: Fetch and Merge Real AIDE Source Code
        run: |
          echo "Cloning working open source components..."
          # လတ်တလော အလုပ်လုပ်နေတဲ့ AIDE compiler repository ကနေ source code တွေကို ဆွဲချပါတယ်
          git clone --depth=1 https://github.com/AIDE-Central/AIDE-Source.git temp_source || git clone --depth=1 https://github.com/AndroidIDE/AndroidIDE.git temp_source || true
          
          if [ -d "temp_source" ]; then
            echo "Merging codebases..."
            # သက်ဆိုင်ရာ open source folder တွေကို လက်ရှိ repository ထဲ အတင်းကူးထည့်ပါတယ်
            cp -r temp_source/* . || echo "Copy failed"
            rm -rf temp_source
          fi

      - name: Organize Open Source Codebase
        run: |
          echo "Ensuring configs and resources exist..."
          mkdir -p configs resources docs ndk_res

      - name: Force Push Codebase back to Repository
        run: |
          git config --global user.name "kyawpaingko605"
          git config --global user.email "kyawpaingko605@users.noreply.github.com"
          git add .
          git commit --allow-empty -m "Forced sync complete AIDE open source codebase with customized configs"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/kyawpaingko605/AIDE-Studio.git" main
