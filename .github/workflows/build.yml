name: Sync Open Source Code

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 💡 GitHub Actions Bot ကို ကုဒ်တွေ ပြန်ရေးခွင့် (Write Permission) ပေးရန် ၎င်းအပိုင်းကို ထည့်ထားပါတယ်
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Organize Open Source Codebase
        run: |
          echo "Organizing AIDE Studio Open Source Project..."
          mkdir -p configs resources docs ndk_res
          
      - name: Verify Configs
        run: |
          echo "Checking JSON structures..."
          cat configs/functions.json || echo "functions.json missing"
          cat configs/resources.json || echo "resources.json missing"

      - name: Commit and Keep Source Updated
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit --allow-empty -m "Automated Open Source Code Sync and Optimization"
          git push origin main
